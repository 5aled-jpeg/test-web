<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Vision - The Era of Spatial Computing</title>
    <meta name="description" content="Discover the new Pro Vision, a premium spatial computing device.">
    <link rel="stylesheet" href="styles.css">
    <!-- Using Google Fonts to approximate SF Pro feeling -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="global-nav">
        <a href="#">Apple</a>
        <a href="#">Store</a>
        <a href="#">Mac</a>
        <a href="#">iPad</a>
        <a href="#">iPhone</a>
        <a href="#">Vision</a>
        <a href="#">Support</a>
    </nav>

    <main>
        <section class="hero-section">
            <h1 class="heading-1 animate-up">Pro Vision.</h1>
            <h3 class="heading-3 animate-up">Welcome to the era of spatial computing.</h3>
            <p class="body-text animate-up">It's a completely new way to look at the world.</p>
            
            <div class="button-container animate-up">
                <a href="#" class="primary-button">Learn more</a>
                <a href="#" class="secondary-button">Buy</a>
            </div>
            
            <div class="hero-image-wrapper animate-up">
                <!-- Fallback to a gray block until image loads -->
                <img id="hero-img" src="premium_sleek_device.png" alt="Sleek premium technological device" loading="lazy">
            </div>
        </section>

        <section class="products-layout">
            <div class="product-card animate-up">
                <h2 class="heading-2" style="color: var(--color-accent)">NEW</h2>
                <h3 class="heading-1" style="font-size: 32px; margin: 12px 0;">MacBook Air</h3>
                <p class="body-text">Lean. Mean. M3 machine.</p>
                <div class="button-container" style="margin-top: 16px;">
                    <a href="#" class="primary-button" style="padding: 8px 16px; font-size: 13px;">Buy</a>
                </div>
            </div>
            <div class="product-card animate-up">
                <h2 class="heading-2" style="color: var(--color-accent)">NEW</h2>
                <h3 class="heading-1" style="font-size: 32px; margin: 12px 0;">iPad Pro</h3>
                <p class="body-text">Unbelievably thin. Incredibly powerful.</p>
                <div class="button-container" style="margin-top: 16px;">
                    <a href="#" class="primary-button" style="padding: 8px 16px; font-size: 13px;">Buy</a>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
